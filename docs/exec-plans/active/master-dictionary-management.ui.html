<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Dictionary Mock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #161311;
      --surface: rgba(35, 31, 29, 0.8);
      --surface-low: rgba(17, 13, 12, 0.46);
      --text: #eae1dd;
      --muted: #d8c3ae;
      --line: rgba(255, 186, 56, 0.18);
      --primary: #ffba38;
      --secondary: #e5beb5;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Noto Serif JP", serif;
      background:
        radial-gradient(circle at top left, rgba(255, 186, 56, 0.12), transparent 28%),
        radial-gradient(circle at 80% 20%, rgba(255, 104, 63, 0.11), transparent 24%),
        linear-gradient(180deg, #1a1513 0%, var(--bg) 100%);
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    .panel, .action-bar {
      background: var(--surface);
      border: 0.5px solid var(--line);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(38px);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }

    .eyebrow, .section-title span {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 10px 0 14px;
      font-size: clamp(40px, 5vw, 64px);
      line-height: 1.04;
      letter-spacing: -0.04em;
      font-style: italic;
    }

    .hero p, .action-bar p, .detail-list dd, .entry-subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .action-strip {
      margin-bottom: 20px;
    }

    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-radius: var(--radius-md);
      background: var(--surface-low);
    }

    .action-bar h3 {
      margin: 0 0 4px;
      font-size: 16px;
    }

    .inline-actions, .detail-ribbon {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .button-primary, .button-secondary, .tag {
      border-radius: 999px;
      font: inherit;
    }

    .button-primary, .button-secondary {
      min-height: 42px;
      padding: 0 18px;
      border: 0;
      cursor: pointer;
    }

    .button-primary {
      color: #432c00;
      background: linear-gradient(135deg, var(--primary) 0%, #e59f12 100%);
    }

    .button-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.02);
      border: 0.5px solid rgba(255, 186, 56, 0.24);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(320px, 0.95fr) minmax(420px, 1.05fr);
      gap: 18px;
    }

    .list-panel, .detail-panel {
      padding: 20px;
      min-height: 720px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 22px;
    }

    .search-box {
      margin-bottom: 18px;
    }

    .field {
      width: 100%;
      min-height: 46px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      border: 0.5px solid rgba(255, 186, 56, 0.18);
      background: rgba(57, 52, 49, 0.28);
      color: var(--text);
      font: inherit;
    }

    .list-stack {
      display: grid;
      gap: 12px;
    }

    .list-item {
      width: 100%;
      padding: 16px;
      text-align: left;
      color: inherit;
      background: rgba(17, 13, 12, 0.28);
      border: 0.5px solid rgba(255, 186, 56, 0.08);
      border-radius: var(--radius-md);
      cursor: pointer;
      font: inherit;
    }

    .list-item.is-selected {
      background: linear-gradient(180deg, rgba(255, 186, 56, 0.13), rgba(17, 13, 12, 0.42));
      border-color: rgba(255, 186, 56, 0.34);
    }

    .list-item strong, .entry-headline strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .tag {
      padding: 8px 12px;
      border: 0.5px solid rgba(255, 186, 56, 0.12);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 12px;
    }

    .detail-headline {
      display: grid;
      gap: 10px;
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 0.5px solid rgba(255, 186, 56, 0.12);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .detail-card, .detail-list div {
      padding: 16px;
      border-radius: var(--radius-md);
      background: var(--surface-low);
      border: 0.5px solid rgba(255, 186, 56, 0.1);
    }

    .detail-card strong {
      display: block;
      margin-top: 8px;
      font-size: 20px;
    }

    .detail-list {
      display: grid;
      gap: 12px;
      margin: 0;
    }

    .detail-list dt {
      margin-bottom: 6px;
      color: var(--secondary);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .banner {
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: rgba(255, 186, 56, 0.08);
      border: 0.5px solid rgba(255, 186, 56, 0.16);
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .action-bar, .workspace {
        grid-template-columns: 1fr;
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel hero">
      <div class="eyebrow">Master Dictionary</div>
      <h1>マスター辞書を独立ページで整理する。</h1>
      <p>辞書を一覧から探し、選択中エントリの内容を確認しながら、取り込みや編集を進める。</p>
    </section>

    <div class="action-strip">
      <div class="action-bar">
        <div>
          <h3>取り込みと操作</h3>
          <p>XMLから取り込み、新規作成、更新、削除をここから行う。</p>
        </div>
        <div class="inline-actions">
          <button class="button-primary" type="button">XMLから取り込み</button>
          <button class="button-secondary" type="button">新規作成</button>
          <button class="button-secondary" type="button">更新</button>
          <button class="button-secondary" type="button">削除</button>
        </div>
      </div>
    </div>

    <section class="workspace">
      <section class="panel list-panel">
        <div class="section-title">
          <h2>マスター辞書一覧</h2>
          <span>Archive</span>
        </div>
        <div class="search-box">
          <input class="field" id="entrySearch" type="search" placeholder="辞書エントリを検索">
        </div>
        <div class="list-stack" id="entryList" aria-live="polite"></div>
      </section>

      <section class="panel detail-panel">
        <div class="section-title">
          <h2>選択中エントリ</h2>
          <span>Detail</span>
        </div>
        <div class="detail-headline">
          <div class="detail-ribbon" id="detailRibbon"></div>
          <div class="entry-headline">
            <strong id="entryTitle">---</strong>
            <p class="entry-subtitle" id="entrySubtitle">---</p>
          </div>
        </div>
        <div class="detail-grid" id="detailGrid"></div>
        <dl class="detail-list" id="detailList"></dl>
      </section>
    </section>
  </main>

  <script>
    const dictionaryEntries = [
      {
        title: "Dragon Priest",
        subtitle: "固有名詞",
        tags: ["固有名詞"],
        cards: [
          { label: "原文", value: "Dragon Priest" },
          { label: "訳語", value: "ドラゴン・プリースト" },
          { label: "最終更新", value: "2026-04-10 21:03" },
          { label: "由来", value: "xTranslator 取込" }
        ],
        details: [
          { term: "カテゴリ", desc: "固有名詞" },
          { term: "由来", desc: "xTranslator 取込" }
        ]
      },
      {
        title: "The Reach",
        subtitle: "地名 / 一貫訳語",
        tags: ["地名"],
        cards: [
          { label: "原文", value: "The Reach" },
          { label: "訳語", value: "リーチ地方" },
          { label: "最終更新", value: "2026-04-08 09:44" },
          { label: "由来", value: "xTranslator 取込" }
        ],
        details: [
          { term: "カテゴリ", desc: "地名" },
          { term: "由来", desc: "xTranslator 取込" }
        ]
      },
      {
        title: "Stormcloak Officer",
        subtitle: "肩書 / 役職語",
        tags: ["役職語"],
        cards: [
          { label: "原文", value: "Stormcloak Officer" },
          { label: "訳語", value: "ストームクローク将校" },
          { label: "最終更新", value: "2026-04-05 16:28" },
          { label: "由来", value: "xTranslator 取込" }
        ],
        details: [
          { term: "カテゴリ", desc: "役職語" },
          { term: "由来", desc: "xTranslator 取込" }
        ]
      }
    ];

    const state = { selectedIndex: 0 };
    const entrySearch = document.getElementById("entrySearch");
    const entryList = document.getElementById("entryList");
    const detailRibbon = document.getElementById("detailRibbon");
    const entryTitle = document.getElementById("entryTitle");
    const entrySubtitle = document.getElementById("entrySubtitle");
    const detailGrid = document.getElementById("detailGrid");
    const detailList = document.getElementById("detailList");

    function currentItem() {
      return dictionaryEntries[state.selectedIndex];
    }

    function renderList() {
      entryList.innerHTML = "";
      const query = entrySearch.value.trim().toLowerCase();
      const filteredItems = dictionaryEntries
        .map((item, index) => ({ item, index }))
        .filter(({ item }) => [item.title, item.subtitle, item.tags.join(" ")].join(" ").toLowerCase().includes(query));

      filteredItems.forEach(({ item, index }) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "list-item" + (index === state.selectedIndex ? " is-selected" : "");
        button.innerHTML =
          "<strong>" + item.title + "</strong>" +
          "<p class=\"entry-subtitle\">" + item.subtitle + "</p>" +
          "<div class=\"detail-ribbon\">" + item.tags.map((tag) => "<span class=\"tag\">" + tag + "</span>").join("") + "</div>";
        button.addEventListener("click", () => {
          state.selectedIndex = index;
          render();
        });
        entryList.appendChild(button);
      });

      if (!filteredItems.length) {
        const empty = document.createElement("div");
        empty.className = "banner";
        empty.textContent = "一致するエントリがありません。検索条件を変えてください。";
        entryList.appendChild(empty);
      }
    }

    function renderDetail() {
      const item = currentItem();
      detailRibbon.innerHTML = "";
      item.tags.forEach((tag) => {
        const chip = document.createElement("span");
        chip.className = "tag";
        chip.textContent = tag;
        detailRibbon.appendChild(chip);
      });
      entryTitle.textContent = item.title;
      entrySubtitle.textContent = item.subtitle;

      detailGrid.innerHTML = "";
      item.cards.forEach((card) => {
        const node = document.createElement("div");
        node.className = "detail-card";
        node.innerHTML = "<span class=\"eyebrow\">" + card.label + "</span><strong>" + card.value + "</strong>";
        detailGrid.appendChild(node);
      });

      detailList.innerHTML = "";
      item.details.forEach((detail) => {
        const row = document.createElement("div");
        row.innerHTML = "<dt>" + detail.term + "</dt><dd>" + detail.desc + "</dd>";
        detailList.appendChild(row);
      });
    }

    function render() {
      renderList();
      renderDetail();
    }

    entrySearch.addEventListener("input", () => {
      renderList();
    });

    render();
  </script>
</body>
</html>
