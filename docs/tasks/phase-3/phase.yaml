phase_id: phase-3
phase_name: Translation Flow MVP
goal: Establish the first end-to-end translation flow with reusable instruction building,
  word translation, persona generation, body translation, and preview.
exit_criteria:
- word translation can feed body translation through a stable reuse contract
- embedded elements remain preserved through regression checks
- representative translation scenarios can run through fixture-based regression
task_types:
  contract: Layer-boundary contracts for instruction building, element preservation,
    and phase handoff.
  verification: Regression fixtures and scenario anchors for preservation and representative
    flow behavior.
  impl: Closed-scope implementation for translation phases and preview observation.
  integ: Composition and scenario proof for the first end-to-end translation flow.
