version: 3
workdir: internal

components:
  bootstrap:
    in: bootstrap/**
  controller:
    in: controller/**
  usecase:
    in: usecase/**
  service:
    in: service/**
  statemachine:
    in: statemachine/**
  jobio:
    in: jobio/**
  repository:
    in: repository/**
  infra_ai:
    in: infra/ai/**
  infra_runtime:
    in: infra/runtime/**
  infra_sqlite:
    in: infra/sqlite/**
  # integration test 専用ディレクトリ。
  # 複数コンポーネントをまたぐ SQLite integration test だけを置く場所。
  # production code を置いてはいけない。
  integrationtest:
    in: integrationtest/**

deps:
  bootstrap:
    deepScan: false
    mayDependOn:
      - controller
      - usecase
      - service
      - repository
      - infra_ai
  controller:
    mayDependOn:
      - usecase
  usecase:
    mayDependOn:
      - service
      - statemachine
      - jobio
  service:
    deepScan: false
    mayDependOn:
      - repository
  jobio:
    mayDependOn:
      - repository
  repository:
    mayDependOn:
      - infra_runtime
      - infra_sqlite
  infra_ai:
    mayDependOn:
      - infra_runtime
  # integration test 専用コンポーネント。
  # infra_sqlite (dbinit) と repository の両方への依存をここだけに許可する。
  integrationtest:
    mayDependOn:
      - infra_sqlite
      - repository
allow:
  depOnAnyVendor: true
