phase_id: phase-4
phase_name: Provider And Execution Expansion
goal: Expand provider support, execution control, and provider-backed persona generation
  without breaking the application and domain direction established in earlier phases.
exit_criteria:
- provider adapters can be swapped without reshaping application and domain policy
- jobs can pause, resume, fail, retry, and cancel through stable execution-control
  behavior
- provider failure and retry behavior is fixed in acceptance checks
- provider-backed master persona generation and job-local persona generation can
  run without redesigning earlier phase boundaries
task_types:
  contract: Layer-boundary contracts for provider selection, execution control states,
    batch mode switching, and persona-generation runtime.
  verification: Provider failure, retry, and persona-generation anchors that fix
    external execution behavior.
  impl: Closed-scope provider, control, UI, and provider-backed persona-generation
    implementations.
  integ: Composition and scenario proof for provider choice, execution control, and
    provider-backed persona generation.
parallel_batches:
- id: P4-B1
  goal: Fix provider, execution-control, and persona-generation contracts plus failure
    anchors.
