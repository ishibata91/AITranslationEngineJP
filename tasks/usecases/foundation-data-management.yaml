id: foundation-data-management
title: 基盤データ管理
usecase: foundation-data-management
related_screens:
  - app-shell.md
  - foundation-data.md
goal: マスターペルソナとマスター辞書を作成、参照、更新、削除、再構築できるようにする。
preconditions:
  - 基盤データを読み込める
completion_criteria:
  - マスターペルソナ一覧を参照できる
  - マスター辞書一覧を参照できる
  - マスターペルソナとマスター辞書を作成できる
  - 選択中の基盤エントリの詳細を確認できる
  - 選択中の基盤エントリを更新できる
  - 選択中の基盤エントリを削除できる
  - 基盤データの再構築導線を確認できる
depends_on: []
related_exec_plans: []
related_tests: []
manual_check_steps:
  - app-shell から Foundation Data を開く
  - Persona と Dictionary を切り替えて観測する
  - 作成、更新、削除の導線を確認する
  - Rebuild 導線を確認する
