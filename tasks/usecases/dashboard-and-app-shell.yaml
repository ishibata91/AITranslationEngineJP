id: dashboard-and-app-shell
title: ダッシュボードとアプリシェル
usecase: dashboard-and-app-shell
related_screens:
  - app-shell.md
  - dashboard.md
goal: アプリ全体の入口として、ダッシュボード、グローバルナビゲーション、主要ページへの導線を成立させる。
preconditions: []
completion_criteria:
  - アプリ起動時にダッシュボードを表示できる
  - グローバルナビゲーションから主要ページへ移動できる
  - ダッシュボードから主要機能の入口を辿れる
  - マスター辞書ページへの独立導線を確認できる
  - マスターペルソナページへの独立導線を確認できる
  - 翻訳管理ページへの独立導線を確認できる
  - 出力管理ページへの独立導線を確認できる
depends_on: []
related_exec_plans: []
related_tests: []
manual_check_steps:
  - アプリ起動後にダッシュボードが表示されることを確認する
  - グローバルナビゲーションを開き、主要ページの一覧を確認する
  - ダッシュボードからマスター辞書ページへ移動する
  - ダッシュボードからマスターペルソナページへ移動する
  - ダッシュボードから翻訳管理ページへ移動する
  - ダッシュボードから出力管理ページへ移動する
