id: term-translation-phase
title: 単語翻訳フェーズ
usecase: term-translation-phase
flow_order: 3
flow_stage: translation_phase
related_screens:
  - app-shell.md
  - job-run.md
goal: 本文翻訳フェーズの前に、用語や固有名詞の訳語を確定してジョブ内辞書へ反映する。
inputs:
  - 翻訳ジョブ
  - 翻訳フィールド
  - 共通辞書
  - 翻訳対象語
outputs:
  - ジョブ内辞書
  - 確定訳語
  - 置換対象の判定結果
preconditions:
  - 翻訳ジョブ作成が完了している
completion_criteria:
  - current phase と progress を確認できる
  - 共通辞書に存在する語を翻訳対象から除外できる
  - 用語や固有名詞の訳語を確定できる
  - 確定訳語を本文翻訳フェーズの入力として参照できる
depends_on:
  - translation-job-setup
related_exec_plans: []
related_tests: []
manual_check_steps:
  - Job Run を開く
  - 単語翻訳フェーズを開始する
  - progress と phase result を確認する
  - 確定訳語とジョブ内辞書を確認する
