id: P1-C02
title: Define minimal job state model contract
type: contract
status: complete
goal: Fix the minimal Phase 1 job state and transition boundary used by create and
  list paths.
owned_scope:
- src-tauri/src/domain/job_state/
- src-tauri/src/application/dto/job/
out_of_scope:
- Paused, RecoverableFailed, Failed, and Canceled states
- provider execution controls
depends_on: []
produces:
- Draft, Ready, Running, Completed state shape and transition policy
consumes:
- phase requirements for minimal job tracking
acceptance_anchor:
- create and list use cases share one stable state contract
parallel_safe_with:
- P1-C01
- P1-V01
- P1-V02
shared_risks:
- adding future recovery states here would widen scope and block immediate implementation
done_when:
- job create and job list tasks can depend on one minimal state contract without reopening
  Phase 1 decisions
