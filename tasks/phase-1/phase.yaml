phase_id: phase-1
phase_name: Input Cache And Job Skeleton
goal: Move from imported xEdit input toward a job-oriented workflow with stable normalized
  translation units and the first fixture-based acceptance path.
exit_criteria:
- one input dataset can be imported, normalized, attached to a job, and observed through
  the first job list path
- FormID, EditorID, record signature, field kind, source text, translated text, and
  output status remain lossless enough for later workflow stages
- the first fixture-based import-to-job acceptance path can run from the execution
  harness
task_types:
  contract: Layer-boundary contract such as normalized translation-unit shape, job
    state model, or query and command DTO.
  verification: Fixture or acceptance anchor that proves lossless preservation and
    import-to-job behavior before broad implementation.
  impl: Closed-scope implementation in backend or frontend code.
  integ: Composition, wiring, and scenario proof that joins Phase 1 work without inventing
    new policy.
parallel_batches:
- id: P1-B1
  goal: Fix Phase 1 contracts and verification anchors before multi-scope implementation.
  task_ids:
  - P1-C01
  - P1-C02
  - P1-V01
  - P1-V02
  notes:
  - owned_scope values are intentionally disjoint inside this batch
- id: P1-B2
  goal: Implement backend and frontend slices in parallel once contracts and fixtures
    are stable.
  task_ids:
  - P1-I04
  - P1-I05
  - P1-I06
  - P1-I07
  notes:
  - job create, job list, and UI slices stay on separate path prefixes
- id: P1-B3
  goal: Prove the first import-to-job scenario through integrated wiring.
  task_ids:
  - P1-G01
  notes:
  - single integration task after batch P1-B2 lands
task_files:
